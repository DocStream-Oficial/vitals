name: CI

# Fase 8A (paso A2): pytest + i18n_audit en matriz Python 3.9 / 3.12 — el repo
# declara "3.9+" (README/CONTRIBUTING) y Docker/producción usan 3.12; correr
# ambas atrapa regresiones de versión sin tener que elegir una sola.
"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  test:
    name: pytest + i18n audit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # 41 tests corren contra el golden dataset en data/health_compact.json
      # (gitignored — en local es el dataset real del usuario). En CI se siembra
      # el dataset demo determinista (mismo esquema, generado por
      # scripts/gen_demo_data.py) para que la suite sea hermética.
      - name: Seed golden dataset (demo fixture)
        run: |
          mkdir -p data
          cp tests/fixtures/demo_dataset.json data/health_compact.json

      - name: Run tests (pytest)
        run: pytest -q

      - name: i18n audit (ES/EN/FR/PT coverage)
        run: python scripts/i18n_audit.py
